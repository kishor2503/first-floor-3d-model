document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

DidMount() { this._waitLibs(); }\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._libTimer) clearTimeout(this._libTimer);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n  componentDidUpdate(prev) {\n    if (!this.scene) return;\n    if (prev.wallHeight !== this.props.wallHeight || prev.furnished !== this.props.furnished) {\n      this.buildWorld();\n    }\n  }\n\n  _waitLibs() {\n    if (window.THREE && window.THREE.OrbitControls) { this.boot(); return; }\n    this._libTimer = setTimeout(() => this._waitLibs(), 80);\n  }\n\n  boot() {\n    const THREE = window.THREE;\n    const el = this.mountEl;\n    if (!el) { this._libTimer = setTimeout(() => this.boot(), 80); return; }\n    if (this.renderer) return;\n    const w = el.clientWidth || window.innerWidth;\n    const h = el.clientHeight || window.innerHeight;\n\n    const renderer = new THREE.WebGLRenderer({ antialias: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(w, h);\n    renderer.shadowMap.enabled = true;\n    renderer.shadowMap.type = THREE.PCFSoftShadowMap;\n    renderer.outputEncoding = THREE.sRGBEncoding;\n    el.appendChild(renderer.domElement);\n    this.renderer = renderer;\n\n    const scene = new THREE.Scene();\n    scene.background = new THREE.Color(0xdde6ec);\n    this.scene = scene;\n\n    const camera = new THREE.PerspectiveCamera(45, w / h, 0.5, 2000);\n    this.camera = camera;\n\n    const controls = new THREE.OrbitControls(camera, renderer.domElement);\n    controls.enableDamping = true;\n    controls.dampingFactor = 0.08;\n    controls.maxPolarAngle = Math.PI * 0.49;\n    controls.minDistance = 18;\n    controls.maxDistance = 140;\n    controls.target.set(0, 3, 0);\n    this.controls = controls;\n\n    scene.add(new THREE.HemisphereLight(0xffffff, 0x9aa0a6, 0.65));\n    const sun = new THREE.DirectionalLight(0xfff4e0, 1.0);\n    sun.position.set(36, 54, 24);\n    sun.castShadow = true;\n    sun.shadow.mapSize.set(2048, 2048);\n    const sc = sun.shadow.camera;\n    sc.left = -42; sc.right = 42; sc.top = 42; sc.bottom = -42; sc.near = 1; sc.far = 170;\n    sun.shadow.bias = -0.0004;\n    scene.add(sun);\n    const fill = new THREE.DirectionalLight(0xbcd2e0, 0.28);\n    fill.position.set(-30, 22, -22);\n    scene.add(fill);\n\n    this.worldGroup = new THREE.Group();\n    scene.add(this.worldGroup);\n\n    this._reset = () => {\n      camera.position.set(48, 42, 54);\n      controls.target.set(0, 3, 0);\n      controls.update();\n    };\n    this._reset();\n    this.buildWorld();\n\n    this._onResize = () => {\n      const W = el.clientWidth, H = el.clientHeight;\n      camera.aspect = W / H; camera.updateProjectionMatrix();\n      renderer.setSize(W, H);\n    };\n    window.addEventListener('resize', this._onResize);\n\n    const loop = () => {\n      this._raf = requestAnimationFrame(loop);\n      controls.update();\n      renderer.render(scene, camera);\n    };\n    loop();\n    this.setState({ ready: true });\n  }\n\n  buildWorld() {\n    const THREE = window.THREE;\n    const g = this.worldGroup;\n    while (g.children.length) {\n      const c = g.children.pop();\n      if (c.geometry) c.geometry.dispose();\n    }\n    const H = (this.props.wallHeight ?? 11);\n    const T = 0.4;\n    const furnished = (this.props.furnished ?? true) !== false;\n    const OFF = -20;\n\n    const M = {\n      wall:    new THREE.MeshStandardMaterial({ color: 0xece7dd, roughness: 0.95 }),\n      wallExt: new THREE.MeshStandardMaterial({ color: 0xe1dacd, roughness: 0.95 }),\n      privacy: new THREE.MeshStandardMaterial({ color: 0xd7d2c6, roughness: 0.9 }),\n      floor:   new THREE.MeshStandardMaterial({ color: 0xc2a982, roughness: 0.85 }),\n      grass:   new THREE.MeshStandardMaterial({ color: 0x6fae57, roughness: 1 }),\n      glass:   new THREE.MeshStandardMaterial({ color: 0xbcd6e2, roughness: 0.05, metalness: 0, transparent: true, opacity: 0.28 }),\n      frame:   new THREE.MeshStandardMaterial({ color: 0x394149, roughness: 0.4, metalness: 0.6 }),\n      grill:   new THREE.MeshStandardMaterial({ color: 0x2f3338, roughness: 0.5, metalness: 0.55 }),\n      roof:    new THREE.MeshStandardMaterial({ color: 0xd6cfc2, roughness: 0.9 }),\n      sheet:   new THREE.MeshStandardMaterial({ color: 0xcfe6ef, roughness: 0.1, transparent: true, opacity: 0.16 }),\n      lower:   new THREE.MeshStandardMaterial({ color: 0x8f897e, roughness: 0.95 }),\n      ground:  new THREE.MeshStandardMaterial({ color: 0xccd0c8, roughness: 1 }),\n      bed:     new THREE.MeshStandardMaterial({ color: 0xe6ded0, roughness: 0.9 }),\n      wood:    new THREE.MeshStandardMaterial({ color: 0x9c7e5c, roughness: 0.7 }),\n      stair:   new THREE.MeshStandardMaterial({ color: 0xcabfa6, roughness: 0.7 }),\n      sofa:    new THREE.MeshStandardMaterial({ color: 0x868c84, roughness: 0.9 }),\n      ward:    new THREE.MeshStandardMaterial({ color: 0x6c7176, roughness: 0.6, metalness: 0.1 }),\n      counter: new THREE.MeshStandardMaterial({ color: 0xb9bdba, roughness: 0.5, metalness: 0.2 }),\n      plant:   new THREE.MeshStandardMaterial({ color: 0x4f8f43, roughness: 0.9 }),\n      pot:     new THREE.MeshStandardMaterial({ color: 0x8a8276, roughness: 0.9 }),\n      doorw:   new THREE.MeshStandardMaterial({ color: 0x7d5a3c, roughness: 0.7 }),\n    };\n\n    const box = (x1, z1, x2, z2, hh, y0, mat, cast = true) => {\n      const wx = Math.abs(x2 - x1), dz = Math.abs(z2 - z1);\n      const m = new THREE.Mesh(new THREE.BoxGeometry(wx, hh, dz), mat);\n      m.position.set((x1 + x2) / 2 + OFF, y0 + hh / 2, (z1 + z2) / 2 + OFF);\n      m.castShadow = cast; m.receiveShadow = true; g.add(m); return m;\n    };\n    const wallX = (x1, x2, z, hh, y0, mat) => box(x1, z - T / 2, x2, z + T / 2, hh, y0, mat);\n    const wallZ = (z1, z2, x, hh, y0, mat) => box(x - T / 2, z1, x + T / 2, z2, hh, y0, mat);\n\n    // ===== FLOORS (stair hole now X14..25, Z24..30 — against south wall) =====\n    box(-34, -34, 74, 74, 0.2, -0.5, M.ground, false);\n    box(0, 0, 30, 24, T, -T, M.floor);\n    box(0, 30, 30, 40, T, -T, M.floor);\n    box(0, 24, 14, 30, T, -T, M.floor);\n    box(25, 24, 30, 30, T, -T, M.floor);\n    box(30, 0, 40, 40, T, -T, M.grass);\n    box(30, 0, 35, 6, T, -T + 0.02, M.floor);\n    box(0, 0, 30, 40, T, -11 - T, M.lower);\n\n    // ===== EXTERIOR WALLS =====\n    wallX(0, 30, 0, H, 0, M.wallExt);                // north (house)\n    wallX(30, 35, 0, H, 0, M.wallExt);               // bathroom-2 north wall\n\n    // west wall (X=0): BR1 window Z3..6, hall-1 big windows Z13..18 & Z21..26\n    const winX = (x, z1, z2, sill, head) => {\n      box(x - 0.04, z1 + 0.05, x + 0.04, z2 - 0.05, head - sill, sill, M.glass, false);\n      box(x - 0.1, z1, x + 0.1, z2, 0.18, sill, M.frame, false);\n      box(x - 0.1, z1, x + 0.1, z2, 0.18, head - 0.18, M.frame, false);\n      box(x - 0.1, z1 - 0.05, x + 0.1, z1 + 0.05, head - sill, sill, M.frame, false);\n      box(x - 0.1, z2 - 0.05, x + 0.1, z2 + 0.05, head - sill, sill, M.frame, false);\n      box(x - 0.1, (z1 + z2) / 2 - 0.04, x + 0.1, (z1 + z2) / 2 + 0.04, head - sill, sill, M.frame, false);\n    };\n    const winZ = (z, x1, x2, sill, head) => {\n      box(x1 + 0.05, z - 0.04, x2 - 0.05, z + 0.04, head - sill, sill, M.glass, false);\n      box(x1, z - 0.1, x2, z + 0.1, 0.18, sill, M.frame, false);\n      box(x1, z - 0.1, x2, z + 0.1, 0.18, head - 0.18, M.frame, false);\n      box(x1 - 0.05, z - 0.1, x1 + 0.05, z + 0.1, head - sill, sill, M.frame, false);\n      box(x2 - 0.05, z - 0.1, x2 + 0.05, z + 0.1, head - sill, sill, M.frame, false);\n      box((x1 + x2) / 2 - 0.04, z - 0.1, (x1 + x2) / 2 + 0.04, z + 0.1, head - sill, sill, M.frame, false);\n    };\n    wallZ(0, 3, 0, H, 0, M.wallExt);\n    wallZ(3, 6, 0, 3, 0, M.wallExt); wallZ(3, 6, 0, H - 8, 8, M.wallExt); winX(0, 3, 6, 3, 8);\n    wallZ(6, 14, 0, H, 0, M.wallExt);\n    wallZ(14, 17, 0, 4, 0, M.wallExt); wallZ(14, 17, 0, H - 7.5, 7.5, M.wallExt); winX(0, 14, 17, 4, 7.5);   // small window\n    wallZ(17, 22, 0, H, 0, M.wallExt);\n    wallZ(22, 25, 0, 4, 0, M.wallExt); wallZ(22, 25, 0, H - 7.5, 7.5, M.wallExt); winX(0, 22, 25, 4, 7.5);   // small window\n    wallZ(25, 40, 0, H, 0, M.wallExt);\n\n    // south wall: store (X0..10 solid), hall-2 (X10..30 window+door+window)\n    // store south wall (X0..10) with one window X3..7\n    wallX(0, 3, 40, H, 0, M.wallExt);\n    wallX(3, 7, 40, 2.8, 0, M.wallExt); wallX(3, 7, 40, H - 8.5, 8.5, M.wallExt); winZ(40, 3, 7, 2.8, 8.5);\n    wallX(7, 13.5, 40, H, 0, M.wallExt);\n    // door centered on combined hall-2 + store wall (~X15)\n    wallX(13.5, 16.5, 40, H - 7, 7, M.wallExt);\n    wallX(16.5, 22, 40, H, 0, M.wallExt);\n    wallX(22, 27, 40, 2.8, 0, M.wallExt); wallX(22, 27, 40, H - 8.5, 8.5, M.wallExt); winZ(40, 22, 27, 2.8, 8.5);\n    wallX(27, 30, 40, H, 0, M.wallExt);\n    box(13.5, 39.93, 16.5, 40.07, 7, 0, M.doorw, false);      // south door leaf (middle)\n\n    // east boundary (X=30)\n    wallZ(0, 2, 30, H, 0, M.wall);\n    wallZ(2, 4, 30, H - 7, 7, M.wall);                        // bath-2 door\n    wallZ(4, 6, 30, H, 0, M.wall);\n    wallZ(6, 9, 30, 3, 0, M.wall); wallZ(6, 9, 30, H - 8, 8, M.wall); winX(30, 6, 9, 3, 8);  // BR2 window\n    wallZ(9, 12.5, 30, H, 0, M.wall);\n    wallZ(27.5, 30.5, 30, H, 0, M.wall);\n    wallZ(30.5, 34, 30, H - 7, 7, M.wall);                    // hall-2 east door (NE corner)\n    wallZ(34, 35, 30, H, 0, M.wall);\n    wallZ(35, 38, 30, 3, 0, M.wall); wallZ(35, 38, 30, H - 8, 8, M.wall); winX(30, 35, 38, 3, 8);  // hall-2 east window beside door\n    wallZ(38, 40, 30, H, 0, M.wall);\n    box(29.93, 2, 30.07, 4, 7, 0, M.doorw, false);            // bath-2 door leaf\n    box(29.93, 30.5, 30.07, 34, 7, 0, M.doorw, false);        // hall-2 east door leaf\n\n    // ===== BEDROOM BAND PARTITIONS =====\n    wallZ(0, 2, 11, H, 0, M.wall); wallZ(2, 4, 11, H - 7, 7, M.wall); wallZ(4, 7, 11, H, 0, M.wall);\n    wallZ(7, 9, 11, H - 7, 7, M.wall); wallZ(9, 10, 11, H, 0, M.wall);   // X=11: bath-1 door + BR1 door (into gap)\n    wallZ(0, 7, 15, H, 0, M.wall); wallZ(7, 9, 15, H - 7, 7, M.wall); wallZ(9, 10, 15, H, 0, M.wall);  // X=15: BR2 door (faces BR1 door)\n    wallX(11, 15, 6, H, 0, M.wall);                            // bathroom-1 south wall\n    wallX(0, 11, 10, H, 0, M.wall); wallX(11, 15, 10, H - 7.5, 7.5, M.wall); wallX(15, 30, 10, H, 0, M.wall);  // bedroom band / hall-1\n\n    // ===== STORE ROOM (X0..10, Z30..40) + hall-1/hall-2 boundary =====\n    // Z=30 wall — solid except the single hall-1 → store door (X2..5). No direct hall-1 ↔ hall-2 opening.\n    wallX(0, 2, 30, H, 0, M.wall); wallX(2, 5, 30, H - 7, 7, M.wall); wallX(5, 30, 30, H, 0, M.wall);\n    box(2, 29.93, 5, 30.07, 7, 0, M.doorw, false);            // hall-1 → store door leaf\n    // store east wall (X=10, Z30..40) with door to hall-2 near NE corner (Z31..34)\n    wallZ(30, 31, 10, H, 0, M.wall); wallZ(31, 34, 10, H - 7, 7, M.wall); wallZ(34, 40, 10, H, 0, M.wall);\n    box(9.93, 31, 10.07, 34, 7, 0, M.doorw, false);           // store → hall-2 door leaf (NE corner)\n\n    // bathroom-2 walls\n    wallZ(0, 6, 35, H, 0, M.wall);\n    wallX(30, 35, 6, H, 0, M.wall);\n\n    // ===== HALL-1 4-PANEL GLASS DOOR (15 wide × full 11 ht) =====\n    const glassDoor = (z1, z2, x, dh) => {\n      const L = z2 - z1;\n      box(x - 0.05, z1 + 0.1, x + 0.05, z2 - 0.1, dh - 0.5, 0.25, M.glass, false);\n      box(x - 0.12, z1, x + 0.12, z2, 0.3, dh - 0.3, M.frame);\n      box(x - 0.12, z1, x + 0.12, z2, 0.25, 0, M.frame);\n      for (let k = 0; k <= 4; k++) { const zz = z1 + (L * k) / 4; box(x - 0.13, zz - 0.08, x + 0.13, zz + 0.08, dh, 0, M.frame); }\n      box(x + 0.13, z1 + L / 2 - 0.7, x + 0.22, z1 + L / 2 - 0.3, 1.4, 4.5, M.frame, false);\n      box(x + 0.13, z1 + L / 2 + 0.3, x + 0.22, z1 + L / 2 + 0.7, 1.4, 4.5, M.frame, false);\n    };\n    glassDoor(12.5, 27.5, 30, H);\n\n    // ===== GRILL HELPER =====\n    const gr = (x1, z1, x2, z2, y0, h) => {\n      const dx = x2 - x1, dz = z2 - z1, len = Math.hypot(dx, dz);\n      const n = Math.max(2, Math.round(len / 0.5));\n      for (let i = 0; i <= n; i++) {\n        const t = i / n, x = x1 + dx * t, z = z1 + dz * t;\n        box(x - 0.045, z - 0.045, x + 0.045, z + 0.045, h, y0, M.grill, false);\n      }\n      if (Math.abs(dx) > Math.abs(dz)) {\n        box(x1, z1 - 0.07, x2, z1 + 0.07, 0.16, y0 + h - 0.16, M.grill, false);\n        box(x1, z1 - 0.07, x2, z1 + 0.07, 0.12, y0 + 0.1, M.grill, false);\n      } else {\n        box(x1 - 0.07, z1, x1 + 0.07, z2, 0.16, y0 + h - 0.16, M.grill, false);\n        box(x1 - 0.07, z1, x1 + 0.07, z2, 0.12, y0 + 0.1, M.grill, false);\n      }\n    };\n\n    // ===== GARDEN WALLS: privacy sheet (0..6) + grills (6..11) =====\n    wallX(35, 40, 0, 6, 0, M.privacy);  gr(35, 0, 40, 0, 6, H - 6);     // north (beside bath-2)\n    wallZ(0, 40, 40, 6, 0, M.privacy);  gr(40, 0, 40, 40, 6, H - 6);    // east\n    // south with open gateway at SW corner (X30..33.5)\n    wallX(33.5, 40, 40, 6, 0, M.privacy); gr(33.5, 40, 40, 40, 6, H - 6);\n    box(30 - 0.1, 39.85, 30 + 0.1, 40.15, 7, 0, M.frame, false);\n    box(33.5 - 0.1, 39.85, 33.5 + 0.1, 40.15, 7, 0, M.frame, false);\n    box(30, 39.85, 33.5, 40.15, 0.3, 7, M.frame, false);\n    wallX(30, 33.5, 40, H - 7, 7, M.privacy);   // solid cover over the gateway (grill covered above door)\n\n    // ===== GARDEN TRANSPARENT ROOF SHEET =====\n    box(30, 0, 40, 40, 0.12, H + 0.5, M.sheet, false);\n    box(30, 0, 40, 0.2, 0.35, H + 0.4, M.frame, false);\n    box(30, 39.8, 40, 40, 0.2, 0.35, H + 0.4, M.frame, false);\n    box(39.8, 0, 40, 40, 0.2, 0.35, H + 0.4, M.frame, false);\n    box(30, 20, 40, 20.2, 0.3, H + 0.4, M.frame, false);\n\n    // ===== INTERIOR STAIRCASE (against south wall; top landing LEFT) =====\n    for (let i = 0; i <= 10; i++) box(14 + i, 24, 15 + i, 30, 1, -i - 1, M.stair);\n    gr(14, 24, 25, 24, 0, 3.5);   // north grill\n    gr(25, 24, 25, 30, 0, 3.5);   // east grill (west open to enter, south is wall)\n\n    // ===== EXTERNAL L-SHAPED GRILL STAIR (garden south → hall-2 terrace) =====\n    for (let i = 0; i <= 5; i++) box(37, 32 + i, 40, 33 + i, 0.16, (i + 1) - 0.16, M.grill, false);  // flight A (along east wall, climb south)\n    box(37, 38, 40, 40, 0.16, 6 - 0.16, M.grill, false);                                              // landing\n    for (let j = 0; j <= 4; j++) box(36 - j, 37, 37 - j, 40, 0.16, (7 + j) - 0.16, M.grill, false);   // flight B (turn right, climb west)\n    box(30, 37, 32, 40, 0.16, 11 - 0.16, M.grill, false);                                             // bridge to terrace\n    for (let i = 0; i <= 5; i++) box(36.95, 32.5 + i - 0.05, 37.05, 32.5 + i + 0.05, 3, i + 1, M.grill, false);  // flight A railing\n    for (let j = 0; j <= 4; j++) box(36.5 - j - 0.05, 36.95, 36.5 - j + 0.05, 37.05, 3, 7 + j, M.grill, false);  // flight B railing\n    // sliding handrail rod along the railing tops\n    const rod = (x1, y1, z1, x2, y2, z2, r) => {\n      const a = new THREE.Vector3(x1 + OFF, y1, z1 + OFF), b = new THREE.Vector3(x2 + OFF, y2, z2 + OFF);\n      const d = new THREE.Vector3().subVectors(b, a), len = d.length();\n      const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 10), M.frame);\n      m.position.copy(a).addScaledVector(d, 0.5);\n      m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), d.clone().normalize());\n      g.add(m);\n    };\n    rod(36.95, 4, 32.5, 36.95, 9, 37.5, 0.09);   // flight A handrail\n    rod(36.5, 10, 37, 32.5, 14, 37, 0.09);        // flight B handrail\n\n    // ===== ROOF / TERRACE (toggle) =====\n    const roofGroup = new THREE.Group();\n    const rh = 0.5;\n    const roof = new THREE.Mesh(new THREE.BoxGeometry(30 + T, rh, 40 + T), M.roof);\n    roof.position.set(15 + OFF, H + rh / 2, 20 + OFF);\n    roof.castShadow = true; roof.receiveShadow = true; roofGroup.add(roof);\n    const br2roof = new THREE.Mesh(new THREE.BoxGeometry(5, rh, 6), M.roof);\n    br2roof.position.set(32.5 + OFF, H + rh / 2, 3 + OFF); br2roof.castShadow = true; roofGroup.add(br2roof);\n    // terrace parapet on hall-2 roof (so it reads as a usable terrace)\n    const par = (x1, z1, x2, z2) => {\n      const m = new THREE.Mesh(new THREE.BoxGeometry(Math.abs(x2 - x1), 2.6, Math.abs(z2 - z1)), M.roof);\n      m.position.set((x1 + x2) / 2 + OFF, H + 1.3, (z1 + z2) / 2 + OFF); m.castShadow = true; roofGroup.add(m);\n    };\n    par(0, 39.8, 30, 40); par(0, 30, 0.2, 40); par(29.8, 30, 30, 37);\n    roofGroup.visible = this.state.roofVisible;\n    g.add(roofGroup);\n    this.roofGroup = roofGroup;\n\n    // ===== FURNITURE =====\n    if (furnished) {\n      const bed = (x1, z1, x2, z2) => {\n        box(x1, z1, x2, z2, 0.9, 0, M.wood);\n        box(x1 + 0.2, z1 + 0.2, x2 - 0.2, z2 - 0.2, 0.6, 0.9, M.bed, false);\n        box(x1 + 0.4, z1 + 0.3, x2 - 0.4, z1 + 1.6, 0.4, 1.5, M.bed, false);\n        box(x1, z1 - 0.4, x2, z1 + 0.1, 3, 0, M.wood);\n      };\n      // Bedroom 1 — wardrobe units flanking window/desk on west wall\n      bed(4.5, 0.5, 9.5, 6.5);\n      box(0.3, 0.5, 2.3, 3, 7, 0, M.ward);\n      box(0.3, 3, 2.3, 6, 2.4, 0, M.wood);          // desk at window\n      box(0.3, 6, 2.3, 9.6, 7, 0, M.ward);\n      // Bedroom 2 — wardrobe units flanking desk on west wall (X=15)\n      bed(19, 0.5, 24, 6.5);\n      box(15.3, 0.5, 17.3, 3, 7, 0, M.ward);\n      box(15.3, 3, 17.3, 5, 2.4, 0, M.wood);        // table space\n      box(15.3, 5, 17.3, 6.9, 7, 0, M.ward);\n      // Open kitchen — Hall-1 NW corner (L counter + tall unit)\n      box(0.3, 10.3, 5, 11.9, 3, 0, M.ward);  box(0.2, 10.2, 5.2, 12.05, 0.2, 3, M.counter, false);\n      box(0.3, 12, 2, 16, 3, 0, M.ward);      box(0.2, 11.9, 2.15, 16.1, 0.2, 3, M.counter, false);\n      box(0.3, 14, 2, 16, 6.2, 0, M.ward);    // tall pantry/fridge\n      // Hall-1 lounge facing the glass door\n      box(7.5, 16, 9.7, 23, 1.4, 0, M.sofa);\n      box(7.5, 16, 8.3, 23, 2.6, 0, M.sofa);\n      box(12, 18, 14, 21, 1, 0, M.wood);\n      // Hall-2 dining\n      box(17, 33.5, 23, 37.5, 0.3, 2.6, M.wood);\n      [[17.5, 33.8], [22, 33.8], [17.5, 36.2], [22, 36.2]].forEach(([cx, cz]) => box(cx, cz, cx + 1.1, cz + 1.1, 1.6, 0, M.wood));\n      // bathroom vanities\n      box(11.4, 0.5, 12.4, 2, 2.5, 0, M.ward);\n      box(33, 0.5, 34.5, 2, 2.5, 0, M.ward);\n      // garden pots (clear of external stair + bath-2)\n      [[31, 10], [31, 18], [31, 26], [37, 18], [31, 33]].forEach(([cx, cz]) => {\n        const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 1.1, 16), M.pot);\n        pot.position.set(cx + OFF, 0.55, cz + OFF); pot.castShadow = true; g.add(pot);\n        const f = new THREE.Mesh(new THREE.SphereGeometry(0.95, 14, 12), M.plant);\n        f.position.set(cx + OFF, 1.7, cz + OFF); f.castShadow = true; g.add(f);\n      });\n    }\n\n    // ===== ROOM LABELS =====\n    const makeLabel = (text) => {\n      const c = document.createElement('canvas'); c.width = 320; c.height = 84;\n      const x = c.getContext('2d');\n      x.fillStyle = 'rgba(22,26,30,0.82)'; x.fillRect(6, 14, 308, 56);\n      x.fillStyle = '#fff'; x.font = 'bold 38px Helvetica, Arial';\n      x.textAlign = 'center'; x.textBaseline = 'middle'; x.fillText(text, 160, 43);\n      const tex = new THREE.CanvasTexture(c); tex.anisotropy = 4;\n      const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true }));\n      s.scale.set(7.2, 1.9, 1); return s;\n    };\n    const label = (txt, x, z, y) => { const s = makeLabel(txt); s.position.set(x + OFF, y || 3.2, z + OFF); g.add(s); };\n    label('Bedroom 1', 6, 4);    label('Bath 1', 13, 3);   label('Bedroom 2', 22, 4);\n    label('Bath 2', 32.5, 3);    label('Kitchen', 2.8, 12); label('Hall 1', 20, 16);\n    label('Hall 2', 20, 35);     label('Store', 5, 35);     label('Garden', 36, 23);\n    label('Stairs \\u2191', 19, 27, 1.5);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
